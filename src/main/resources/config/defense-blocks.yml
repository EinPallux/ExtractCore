# ═══════════════════════════════════════════
#    ExtractCore - Defense Blocks Configuration
# ═══════════════════════════════════════════

settings:
  # Action-bar template shown when a defense block is hit.
  # Placeholders: {name} {hp} {max_hp}
  hit-actionbar: "&c{name} &8| &eHP: &f{hp}&8/&f{max_hp}"

  # Sound played to the attacker on each hit
  # Use any valid Bukkit Sound enum name: https://jd.papermc.io/paper/1.21/org/bukkit/Sound.html
  hit-sound: "BLOCK_STONE_HIT"
  hit-sound-volume: 0.5
  # Pitch scales dynamically between hit-sound-pitch-min and (pitch-min + pitch-range)
  # as the block loses HP — starts low, rises toward max HP
  hit-sound-pitch-min: 0.8
  hit-sound-pitch-range: 0.4

  # Sound played when a defense block is fully destroyed
  destroy-sound: "BLOCK_STONE_BREAK"
  destroy-sound-volume: 1.0
  destroy-sound-pitch: 1.0

# ── Defense Block Tiers ──────────────────────────────────────────
# Each block requires {hp} hits to destroy.
# Defense blocks do NOT auto-despawn — they persist until destroyed.
# They bypass WorldGuard block-place/break protection (except extract-core-place=deny).
#
# Placeholders in lore:
#   {hp}     – hit points (number of hits to destroy)
#   {cost}   – cost in Scrap
#   {amount} – stack size given per purchase
