# ═══════════════════════════════════════════
#        ExtractCore - Shop Configuration
# ═══════════════════════════════════════════

settings:
  # How many hours after placement before normal shop blocks automatically despawn.
  # Supports decimals (e.g. 1.5 = 1 hour 30 minutes)
  normal-block-despawn-hours: 2.0

# ── Normal Blocks ────────────────────────────────────────────────
# These blocks auto-despawn after normal-block-despawn-hours.
# They bypass WorldGuard block-place protection (but not extract-core-place=deny).
#
# Placeholders in lore:
#   {cost}   – cost in Scrap
#   {amount} – stack size given per purchase
normal-blocks:

  cobblestone:
    material: COBBLESTONE
    display-name: "&7◈ Cobblestone"
    lore:
