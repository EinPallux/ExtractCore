# ═══════════════════════════════════════════════════════════════════
#           ExtractCore - GUI & Display Configuration
#  Every title, item name, lore line, button label and dynamic text
#  is defined here. Supports &#RRGGBB hex and &c legacy colors.
#
#  Placeholders usable in lore/name fields:
#    {player}        player name
#    {level}         colored level
#    {level_raw}     raw level number
#    {progress}      XP progress % (e.g. 80.0)
#    {scrap}         formatted scrap
#    {screws}        formatted screws
#    {energy}        formatted energy cells
#    {bio}           formatted bio samples
#    {tech}          formatted tech shards
#    {tier}          current gear tier number
#    {max_tier}      max gear tier number
#    {speed_lvl}     core speed upgrade level
#    {prod_lvl}      core production upgrade level
#    {core_x/y/z}    core coordinates
#    {scrap_rate}    scrap per interval
#    {interval}      generation interval in seconds
#    {kills} {deaths} {kd} {extractions} {cores_destroyed}
#    {playtime_h} {playtime_m}
#    {milestones_done} {milestones_total}
#    {next_extraction} {current_extraction}
#    {cost_scrap} {cost_screws} {cost_energy} {cost_bio} {cost_tech}
#    {next_display}  display name of the next upgrade tier
#    {sword_t} {pickaxe_t} {axe_t} {helmet_t} {chest_t} {legs_t} {boots_t}
# ═══════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────
# MAIN MENU  (/extract, /menu)
# ─────────────────────────────────────────────────────────────────
main-menu:
  title: "&#5B8DD9◈ &fExtract &8— &7Main Menu"
  rows: 6

  player-overview:
    slot: 13
    material: PLAYER_HEAD
    name: "&#5B8DD9◈ &f{player}"
    lore:
      - "&8━━━━━━━━━━━━━━━━━━━━━━━━"
      - "&7Level:    {level}"
      - "&7Progress: &e{progress}%"
      - ""
      - "&7Scrap:        &e{scrap}"
      - "&7Screws:       &b{screws}"
      - "&7Energy Cells: &a{energy}"
      - "&7Bio Samples:  &d{bio}"
      - "&7Tech Shards:  &6{tech}"
      - "&8━━━━━━━━━━━━━━━━━━━━━━━━"

  armory-button:
