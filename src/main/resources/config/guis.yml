# ─────────────────────────────────────────────────────────────────
# ARMORY GUI  (/armory)
# ─────────────────────────────────────────────────────────────────
armory:
  title: "&#5B8DD9◈ &fArmory &8— &7Upgrade your Gear"
  rows: 6

  info-item:
    slot: 4
    material: NETHER_STAR
    name: "&#5B8DD9◈ &fArmory"
    lore:
      - "&8━━━━━━━━━━━━━━━━━━━━━━━━"
      - "&7Upgrade your &eGear &7using"
      - "&7materials gathered from"
      - "&eExtractions &7and &eCores&7."
      - ""
      - "&8→ &7Click any item to upgrade"
      - "&8━━━━━━━━━━━━━━━━━━━━━━━━"

  # Gear slot positions [sword, pickaxe, axe, helmet, chestplate, leggings, boots]
  gear-slots: [10, 12, 14, 28, 30, 32, 34]

  # Display labels for each gear type (used in lore header)
  gear-labels:
    sword:      "⚔ Sword"
    pickaxe:    "⛏ Pickaxe"
    axe:        "🪓 Axe"
    helmet:     "◈ Helmet"
    chestplate: "◈ Chestplate"
    leggings:   "◈ Leggings"
    boots:      "◈ Boots"

  # Gear item lore template — {gear_label}, {tier}, {max_tier}, cost placeholders, etc.
  gear-lore-header:
    - "&8━━━━━━━━━━━━━━━━━━━━━━━━"
    - "&7Current Tier: &f{tier} &8/ &f{max_tier}"
    - ""
  gear-lore-cost-header: "&7Upgrade Cost:"
  gear-lore-cost-scrap:  "  &8◆ &eScrap: &f{cost_scrap}"
  gear-lore-cost-screws: "  &8◆ &bScrews: &f{cost_screws}"
  gear-lore-cost-energy: "  &8◆ &aEnergy Cells: &f{cost_energy}"
  gear-lore-cost-bio:    "  &8◆ &dBio Samples: &f{cost_bio}"
  gear-lore-cost-tech:   "  &8◆ &6Tech Shards: &f{cost_tech}"
  gear-lore-can-afford:    "&#5B8DD9→ &aClick to upgrade!"
  gear-lore-cant-afford:   "&c✘ Not enough resources."
  gear-lore-max-tier:      "&#FFD700★ &eMax Tier Reached!"
  gear-lore-footer:
    - "&8━━━━━━━━━━━━━━━━━━━━━━━━"

  # Name format for gear item in GUI: {color_prefix}{gear_label} [T{tier}]
  gear-name-format: "&#5B8DD9{gear_label} &8[&fT{tier}&8]"

  close-button:
    slot: 49
    material: BARRIER
    name: "&cClose"
    lore:
      - "&7Click to close this menu."

