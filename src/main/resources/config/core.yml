# ═══════════════════════════════════════════
#        ExtractCore - Core Configuration
# ═══════════════════════════════════════════

core:
  # Base scrap generated per tick interval (before any upgrades)
  base-scrap-per-interval: 10
  # Base interval in seconds between scrap generation ticks
  base-interval-seconds: 10
  # Seconds it takes to pick up the core
  pickup-duration-seconds: 10
  # Percent of upgrade progress lost when core is destroyed by another player
  destroy-loss-percent: 20
  # Percent of scrap STORED IN THE CORE that the raider receives on destroy
  raid-reward-percent: 10

  # The display name of the Core item
  item-name: "&#FF7D14&lY&#FF7418&lO&#FF6A1B&lU&#FF611F&lR &#FF4E26&lC&#FF442A&lO&#FF3B2D&lR&#FF3131&lE"
  item-lore:
    - "&#FF7D14&l━&#FF7A15&l━&#FF7617&l━&#FF7318&l━&#FF7019&l━&#FF6C1A&l━&#FF691C&l━&#FF661D&l━&#FF631E&l━&#FF5F1F&l━&#FF5C21&l━&#FF5922&l━&#FF5523&l━&#FF5224&l━&#FF4F26&l━&#FF4B27&l━&#FF4828&l━&#FF4529&l━&#FF422B&l━&#FF3E2C&l━&#FF3B2D&l━&#FF382E&l━&#FF3430&l━&#FF3131&l━"
    - "&7Place this down to begin"
    - "&7generating &#FF7D14Scrap&7."
    - ""
    - "&#FF7D14&l︳ &7Your Core acts as your Base."
    - "&#FF7D14&l━&#FF7A15&l━&#FF7617&l━&#FF7318&l━&#FF7019&l━&#FF6C1A&l━&#FF691C&l━&#FF661D&l━&#FF631E&l━&#FF5F1F&l━&#FF5C21&l━&#FF5922&l━&#FF5523&l━&#FF5224&l━&#FF4F26&l━&#FF4B27&l━&#FF4828&l━&#FF4529&l━&#FF422B&l━&#FF3E2C&l━&#FF3B2D&l━&#FF382E&l━&#FF3430&l━&#FF3131&l━"

  # PDC key used to mark the core item (do not change after deployment)
  nbt-key: "extractcore_beacon"


  # ── Hologram above placed Core ───────────────────────────────────────────
  hologram:
    # Enable or disable the hologram entirely
    enabled: true
    # How many ticks between hologram text refreshes (20 = 1s, 40 = 2s)
    refresh-ticks: 40
    # Y offset above the beacon block (beacon is 1 block tall)
    y-offset: 2.0
    # Scale of the text (1.0 = default MC text size)
    scale: 1.0
    # Drop shadow behind text
    shadow: true
    # Semi-transparent dark background panel (false = no background)
    background: false

    # Lines displayed top to bottom.
    # Supports &#RRGGBB hex and &c legacy colors.
    # Available placeholders:
    #   {owner}      — owner's player name
    #   {stored}     — stored scrap (formatted, e.g. 7.4K)
    #   {stored_raw} — stored scrap (raw number)
    #   {rate}       — scrap generated per interval (formatted)
    #   {interval}   — generation interval in seconds
    #   {speed_lvl}  — current speed upgrade level
    #   {prod_lvl}   — current production upgrade level
    #   {speed_max}  — max speed upgrade level
    #   {prod_max}   — max production upgrade level
    lines:
      - "&#FF7D14&l{owner}'s Core"
      - "&8▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔"
      - "&#FF7D14⬡ &7Stored:  &#FF7D14{stored} Scrap"
      - "&#FF7D14⚡ &7Output:  &#FF7D14+{rate} &7/ &#FF7D14{interval}s"
      - "&#FF7D14&l︳ &7Speed Lvl {speed_lvl}&8/{speed_max}  &#FF7D14&l︳ &7Prod Lvl {prod_lvl}&8/{prod_max}"

  # ── Core Upgrade Levels (100 levels each) ────────────────────────────
  # Speed: reduces the generation interval (how often Scrap is produced)
  # Production: increases the amount of Scrap produced per interval
  #
  # Material unlock thresholds:
  #   Levels  1-15:  Scrap only
  #   Levels 16-30:  + Screws
  #   Levels 31-50:  + Energy Cells
  #   Levels 51-70:  + Bio Samples
  #   Levels 71-100: + Tech Shards

