# ═══════════════════════════════════════════
#       ExtractCore - Messages Configuration
# Supports: &#RRGGBB hex and &c legacy colors
#
# Use {prefix} anywhere to insert the prefix
# defined below. It is resolved automatically
# before color codes are translated.
# ═══════════════════════════════════════════

prefix: "&#5B8DD9◈ &#E0E0E0&lEXTRACT &8➠ "

# ── General ──────────────────────────────
general:
  no-permission:        "{prefix}&cYou don't have permission to do that."
  player-only:          "{prefix}&cThis command can only be used by players."
  player-not-found:     "{prefix}&cPlayer &e{player} &cwas not found."
  invalid-amount:       "{prefix}&cInvalid amount. Please enter a positive number."
  reload-success:       "{prefix}&aPlugin reloaded successfully&8."
  not-enough-materials: "{prefix}&cYou don't have enough &e{material}&c."
  config-error:         "{prefix}&cA configuration error occurred. Please contact an admin."

# ── Core ─────────────────────────────────
core:
  no-core:                         "{prefix}&cYou do not have a Core in your inventory or placed down."
  core-placed:                     "{prefix}&aYour Core has been placed! &7It will now generate Scrap."
  core-picked-up:                  "{prefix}&7Core picked up and returned to your inventory."
  core-pickup-started:             "{prefix}&#FFD700Picking up your Core... &8(&e{seconds}s&8)"
  core-pickup-cancelled:           "{prefix}&cPickup cancelled &7— you moved or were interrupted."
  core-pickup-progress:            "{prefix}&#FFD700Picking up Core: &e{seconds}s &7remaining..."
  nothing-to-collect:              "{prefix}&7There is no Scrap stored in your Core yet."
  scrap-collected:                 "{prefix}&7Collected &e+{amount} Scrap &7from your Core."
  scrap-collected-on-pickup:       "{prefix}&7Auto-collected &e{amount} Scrap &7stored in your Core."
  coordinates:                     "{prefix}&7Your Core: &eX: {x} &8| &eY: {y} &8| &eZ: {z} &8(&7{world}&8)"
  no-core-placed:                  "{prefix}&7You haven't placed your Core yet."
  teleported-to-core:              "{prefix}&7Teleported to your Core."
  spawn-given:                     "{prefix}&7You have been given your &eStarting Gear&7."
  already-placed:                  "{prefix}&cYou already have a Core placed. Pick it up first."
  pickup-too-far:                  "{prefix}&cYou are too far from your Core. Get within &e{range} blocks &cto pick it up."
  placement-denied-region:         "{prefix}&cYou cannot place your Core in this protected area."
  # Raid / destruction — event-style, no prefix fits better here
  core-destroyed:                  "&c&l✘ Your Core was destroyed! &7You lost &e20%% &7of your upgrade progress."
  core-destroyed-attacker:         "{prefix}&7You destroyed &e{player}'s &7Core!"
  core-destroyed-attacker-offline: "{prefix}&7You destroyed &e{player}'s &7Core! &8(offline)"
  core-raid-broadcast:             "&#FF4444⚔ &e{attacker} &7raided &e{owner}'s &7Core!"
  raid-reward:                     "{prefix}&#FFD700Raid Reward: &e+{amount} Scrap &7from the Core storage!"

# ── Extraction ───────────────────────────
extraction:
  zone-defined:    "{prefix}&7Extraction Zone &e{name} &7has been defined."
  zone-define-fail: "{prefix}&cFailed to define zone. Make sure you have a WorldEdit selection."
  zone-not-found:  "{prefix}&cExtraction zone &e{name} &cwas not found."
  # Multi-line broadcast — no prefix, self-styled header
  started: |
    &#5B8DD9&l⚡ EXTRACTION STARTED ⚡
    &#E0E0E0Zone: &e{name}
    &#E0E0E0Center: &7X: {x} &8| &7Z: {z}
    &#E0E0E0Active for: &e{duration} minutes
    &#5B8DD9Head to the zone to earn rewards!
  ended-header:          "&#5B8DD9&l⚡ EXTRACTION ENDED &8— &e{name}"
  ended-participants:    "&#E0E0E0Participants: &7{players}"
  ended-no-participants: "&#8888AANo players participated in this extraction."
  # Multi-line reward summary — no prefix
  reward-received: |
    &#5B8DD9&l✔ Extraction Rewards Received!
    &7Scrap: &e+{scrap}  &8| &7Screws: &b+{screws}
    &7Energy Cells: &a+{energy}  &8| &7Bio Samples: &d+{bio}
    &7Tech Shards: &6+{tech}
  bossbar-loading: "&#5B8DD9⚡ Loading extraction info..."
  bossbar-next:    "&#5B8DD9⚡ Next Extraction in: &e{time}"
  bossbar-active:  "&#FF6B35⚡ Extraction Active: &e{name} &8— &7Ends in: &e{time}"

# ── Kill / Death ─────────────────────────
# Multi-line summaries — no prefix, self-styled
kill:
  killer-reward: |
    &#5B8DD9&l⚔ Kill Reward &8— &e{victim}
    &7Scrap: &e+{scrap}  &8| &7Screws: &b+{screws}
    &7Energy Cells: &a+{energy}  &8| &7Bio Samples: &d+{bio}
    &7Tech Shards: &6+{tech}
  victim-loss: |
    &c&l✘ You lost materials on death:
    &7Scrap: &c-{scrap}  &8| &7Screws: &c-{screws}
    &7Energy Cells: &c-{energy}  &8| &7Bio Samples: &c-{bio}
    &7Tech Shards: &c-{tech}

# ── Leveling ─────────────────────────────
level:
  # Multi-line announcement — no prefix, uses bold banner header
  level-up: |
    &#FFD700&l✦ LEVEL UP! &#FFD700Level {level}
    &#E0E0E0You earned: &e+{points} Points &8| &7{materials}
  xp-gained: "{prefix}&7+{xp} XP &8({source})"

# ── Armory ───────────────────────────────
armory:
  upgraded:             "{prefix}&7Upgraded &e{item} &7to &e{tier}&8."
  not-enough-resources: "{prefix}&cNot enough resources to upgrade."
  max-tier:             "{prefix}&7This item is already at &emax tier&7."

# ── Milestones ───────────────────────────
milestones:
  claimable-notify: "{prefix}&#FFD700A Milestone is ready to claim! &7Use &e/milestones &7to collect."
  # Multi-line achievement banner — no prefix
  completed: |
    &#FFD700&l★ MILESTONE COMPLETED!
    &#E0E0E0{milestone}
    &#5B8DD9Rewards: &7{rewards}
  already-completed: "{prefix}&7You have already completed this milestone."

# ── Exchange ─────────────────────────────
exchange:
  purchased:        "{prefix}&7Purchased &e{amount}x {material} &7for &e{cost} Scrap&8."
  not-enough-scrap: "{prefix}&cNot enough Scrap. You need &e{cost} Scrap&c."

# ── Shop ─────────────────────────────────
shop:
  purchased:               "{prefix}&7Purchased &e{amount}x {item} &7for &e{cost} Scrap&8."
  not-enough-scrap:        "{prefix}&cNot enough Scrap. You need &e{cost} Scrap&c."
  inventory-full:          "{prefix}&cYour inventory is full. Make some space first."
  placement-denied-region: "{prefix}&cYou cannot place blocks in this protected area."
  defense-block-destroyed: "{prefix}&7You destroyed a &e{name}&8."

# ── Admin ────────────────────────────────
admin:
  set-currency:       "{prefix}&7Set &e{player}'s &7{currency} to &e{amount}&8."
  give-currency:      "{prefix}&7Gave &e{player} &e{amount} &7{currency}&8."
  take-currency:      "{prefix}&7Took &e{amount} &7{currency} from &e{player}&8."
  reset-confirm-title: "&#FF4444Confirm Reset"
  reset-success:      "{prefix}&7Reset &e{type} &7for &e{player}&8."
  reset-cancel:       "{prefix}&7Reset cancelled."
  invalid-currency:   "{prefix}&cInvalid currency. Valid: scrap, screws, energycells, biosamples, techshards"
  invalid-reset-type: "{prefix}&cInvalid reset type."